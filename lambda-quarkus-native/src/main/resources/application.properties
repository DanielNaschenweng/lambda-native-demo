# Handler CDI exposto ao runtime Lambda
quarkus.lambda.handler=ingressLambda

# Cliente SQS: transporte URLConnection (leve, sem pool — ideal para Lambda)
quarkus.sqs.sync-client.type=url
quarkus.sqs.aws.region=${AWS_REGION:us-east-1}
quarkus.sqs.aws.credentials.type=default

# Para LocalStack, defina a variável de ambiente:
#   QUARKUS_SQS_ENDPOINT_OVERRIDE=http://localhost:4566

# Inclui o mapa de rotas no binário nativo
quarkus.native.resources.includes=routes.json
